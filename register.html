<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sign up · Botanical Garden</title>
    <link rel="icon" type="image/jpeg" href="/images/Botanicalpark_logo.jpg" />
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --jet-black: #0E0E0E;
            --pure-white: #FFFFFF;
            --deep-green: #1B4332;
            --soft-leaf: #74C69D;
            --text-main: #0E0E0E;
            --text-heading: #0E0E0E;
            --card-bg: #FFFFFF;
            --border-light: #D0E6D5;
            --bg-primary: #FFFFFF;
            --accent-deep: #1B4332;
            --accent-soft: #74C69D;
            --input-bg: #FFFFFF;
            --label-color: #0E0E0E;
            --input-text: #0E0E0E;
            --input-placeholder: #666666;
            --icon-color: #1B4332;
            --checkbox-label: #0E0E0E;
            --separator-text: #666666;
            --intro-text: #2D2D2D;
            --strength-text: #666666;
            --social-border: #1B4332;
            --card-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
        }

        [data-theme="dark"] {
            --bg-primary: #121212;
            --text-main: #E8F0E8;
            --text-heading: #FFFFFF;
            --card-bg: #1A251F;
            --border-light: #2D6A4F;
            --accent-deep: #2D6A4F;
            --accent-soft: #8FDEB0;
            --input-bg: #1E2A22;
            --label-color: #8FDEB0;
            --input-text: #E8F0E8;
            --input-placeholder: #889988;
            --icon-color: #8FDEB0;
            --checkbox-label: #E8F0E8;
            --separator-text: #A0B0A0;
            --intro-text: #C0D0C0;
            --strength-text: #A0B0A0;
            --social-border: #8FDEB0;
            --card-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-main);
            transition: background-color 0.25s ease, color 0.25s ease;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
            background-image: radial-gradient(circle at 20% 30%, rgba(116, 198, 157, 0.04) 0%, transparent 50%);
        }

        /* fixed corner toggles */
        .toggle-corner {
            position: fixed;
            top: 1.2rem;
            right: 1.2rem;
            display: flex;
            gap: 0.7rem;
            z-index: 1050;
        }

        .control-bubble {
            width: 44px;
            height: 44px;
            background: var(--card-bg);
            border: 2px solid var(--deep-green);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--deep-green);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(2px);
        }

        .control-bubble:hover {
            background: var(--deep-green);
            color: white;
            transform: scale(0.96);
            border-color: var(--soft-leaf);
        }

        [data-theme="dark"] .control-bubble {
            color: var(--soft-leaf);
            border-color: var(--soft-leaf);
        }
        [data-theme="dark"] .control-bubble:hover {
            background: var(--soft-leaf);
            color: #121212;
        }

        /* main container - flexible, no scroll inside */
        .auth-wrapper {
            width: 100%;
            max-width: 540px;
            margin: 0 auto;
        }

        /* card design - fresh and neat, slightly wider for register */
        .auth-card {
            background: var(--card-bg);
            border-radius: 2rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
            padding: 1.8rem 2rem 2rem;
            transition: all 0.2s;
        }

        /* brand section - SINGLE LINE FIX for 360px */
        .brand-block {
            text-align: center;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--border-light);
        }

        .brand-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            text-decoration: none;
            flex-wrap: nowrap;
            white-space: nowrap;
        }

        .brand-icon {
            width: 2.8rem;
            height: 2.8rem;
            background: rgba(27, 67, 50, 0.1);
            border-radius: 1.2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--soft-leaf);
            flex-shrink: 0;
        }
        .brand-icon i {
            font-size: 1.7rem;
            color: var(--deep-green);
        }
        [data-theme="dark"] .brand-icon i {
            color: var(--soft-leaf);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.2;
        }

        .brand-name {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-heading);
            white-space: nowrap;
        }
        .brand-name span {
            color: var(--deep-green);
        }
        [data-theme="dark"] .brand-name span {
            color: var(--soft-leaf);
        }
        .brand-tag {
            font-size: 0.55rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            color: var(--separator-text);
            text-transform: uppercase;
            margin-top: -0.1rem;
            white-space: nowrap;
        }

        /* welcome section */
        .welcome-section {
            text-align: left;
            margin-bottom: 1.2rem;
        }
        .welcome-section h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-heading);
            line-height: 1.2;
            letter-spacing: -0.3px;
        }
        .welcome-section p {
            font-size: 0.85rem;
            color: var(--intro-text);
            margin-top: 0.2rem;
        }

        /* form fields */
        .input-field-group {
            margin-bottom: 1rem;
        }
        .field-label {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.3rem;
        }
        .field-label span {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--label-color);
        }

        .input-wrapper {
            position: relative;
        }
        .input-icon-left {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--icon-color);
            font-size: 0.9rem;
            pointer-events: none;
        }
        .input-field {
            width: 100%;
            background: var(--input-bg);
            border: 1.5px solid var(--border-light);
            border-radius: 60px;
            padding: 0.7rem 1rem 0.7rem 2.5rem;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            color: var(--input-text);
            transition: all 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--deep-green);
            box-shadow: 0 0 0 3px rgba(27, 67, 50, 0.12);
        }
        [data-theme="dark"] .input-field:focus {
            border-color: var(--soft-leaf);
            box-shadow: 0 0 0 3px rgba(143, 222, 176, 0.2);
        }
        .password-eye {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-main);
            opacity: 0.6;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .password-eye:hover {
            opacity: 1;
            color: var(--deep-green);
        }

        /* two column grid for name fields */
        .two-col-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-bottom: 0.2rem;
        }

        /* strength meter */
        .strength-container {
            margin: 0.2rem 0 0.8rem;
        }
        .strength-bar-bg {
            height: 4px;
            background: var(--border-light);
            border-radius: 20px;
            overflow: hidden;
        }
        .strength-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--deep-green);
            transition: width 0.25s ease;
            border-radius: 20px;
        }
        [data-theme="dark"] .strength-bar-fill {
            background: var(--soft-leaf);
        }
        .strength-text {
            font-size: 0.6rem;
            font-weight: 500;
            color: var(--strength-text);
            margin-top: 0.2rem;
            letter-spacing: 0.2px;
        }

        /* checkbox row */
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.8rem 0 1.2rem;
        }
        .checkbox-row input {
            width: 1rem;
            height: 1rem;
            accent-color: var(--deep-green);
            cursor: pointer;
        }
        .checkbox-row label {
            font-size: 0.8rem;
            color: var(--checkbox-label);
            cursor: pointer;
        }

        /* primary button */
        .btn-register {
            background: var(--deep-green);
            border: none;
            border-radius: 60px;
            padding: 0.75rem;
            width: 100%;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 18px -8px rgba(27, 67, 50, 0.4);
            font-family: 'Inter', sans-serif;
        }
        .btn-register:hover {
            background: var(--soft-leaf);
            color: var(--jet-black);
            transform: translateY(-1px);
        }
        .btn-register:active {
            transform: translateY(1px);
        }

        /* sign in prompt */
        .signin-prompt {
            text-align: center;
            margin: 1.2rem 0 0.8rem;
        }
        .signin-prompt span {
            font-size: 0.8rem;
            color: var(--intro-text);
        }
        .signin-link {
            color: var(--deep-green);
            text-decoration: none;
            font-weight: 700;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
            margin-left: 0.25rem;
        }
        .signin-link:hover {
            border-bottom-color: var(--deep-green);
        }
        [data-theme="dark"] .signin-link {
            color: var(--soft-leaf);
        }
        [data-theme="dark"] .signin-link:hover {
            border-bottom-color: var(--soft-leaf);
        }

        /* separator */
        .divider {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 1rem 0 1rem;
        }
        .divider-line {
            flex: 1;
            height: 1.5px;
            background: var(--border-light);
        }
        .divider-text {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--separator-text);
        }

        /* social row */
        .social-row {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-top: 0.2rem;
        }
        .social-btn {
            flex: 1;
            background: transparent;
            border: 1.5px solid var(--social-border);
            border-radius: 50px;
            padding: 0.55rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--deep-green);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        [data-theme="dark"] .social-btn {
            color: var(--soft-leaf);
        }
        .social-btn i {
            font-size: 0.9rem;
        }
        .social-btn:hover {
            background: var(--deep-green);
            color: white;
            border-color: var(--deep-green);
        }
        [data-theme="dark"] .social-btn:hover {
            background: var(--soft-leaf);
            color: #121212;
            border-color: var(--soft-leaf);
        }

        /* toast */
        .toast-container {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1100;
            width: auto;
            max-width: 90%;
            pointer-events: none;
        }
        .toast {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-left: 5px solid var(--soft-leaf);
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            box-shadow: 0 12px 24px -12px rgba(0,0,0,0.3);
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-main);
            border: 1px solid var(--border-light);
            text-align: center;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- critical: brand name never breaks even at 360px --- */
        @media (max-width: 480px) {
            .auth-card {
                padding: 1.2rem 1.3rem 1.6rem;
            }
            .brand-link {
                gap: 0.5rem;
            }
            .brand-name {
                font-size: 1.45rem;
                white-space: nowrap;
            }
            .brand-tag {
                font-size: 0.48rem;
                white-space: nowrap;
            }
            .brand-icon {
                width: 2.4rem;
                height: 2.4rem;
            }
            .brand-icon i {
                font-size: 1.4rem;
            }
            .welcome-section h2 {
                font-size: 1.55rem;
            }
            .two-col-grid {
                gap: 0.6rem;
            }
        }

        @media (max-width: 360px) {
            .brand-name {
                font-size: 1.3rem;
                white-space: nowrap;
            }
            .brand-tag {
                font-size: 0.45rem;
                white-space: nowrap;
            }
            .brand-link {
                gap: 0.4rem;
            }
            .auth-card {
                padding: 1rem 1.1rem 1.4rem;
            }
            .two-col-grid {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
            .input-field {
                font-size: 0.85rem;
                padding: 0.65rem 1rem 0.65rem 2.3rem;
            }
        }

        /* scroll handling if needed */
        .auth-wrapper {
            max-height: 100vh;
            overflow-y: auto;
            scrollbar-width: thin;
            padding: 0.5rem 0;
        }
        .auth-wrapper::-webkit-scrollbar {
            width: 4px;
        }
    </style>
</head>
<body>
    <div class="toggle-corner">
        <button class="control-bubble" id="rtl-toggle" title="RTL/LTR" aria-label="Toggle direction">
            <i class="fas fa-arrows-rotate"></i>
        </button>
        <button class="control-bubble" id="theme-toggle" title="Dark/Light mode" aria-label="Theme">
            <i class="fas fa-circle-half-stroke" id="theme-icon"></i>
        </button>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- Brand area: forced single line -->
            <div class="brand-block">
                <a href="index.html" class="brand-link">
                    <div class="brand-icon">
                        <i class="fas fa-seedling"></i>
                    </div>
                    <div class="brand-text">
                        <div class="brand-name">Botanical<span> Garden</span></div>
                        <div class="brand-tag">botanical preserve</div>
                    </div>
                </a>
            </div>

            <!-- welcome section -->
            <div class="welcome-section">
                <h2>Join the preserve</h2>
                <p>create your nature account · start your journey</p>
            </div>

            <!-- Registration Form -->
            <form id="registerFormElement" onsubmit="handleRegister(event)">
                <!-- First & Last Name - two column grid -->
                <div class="two-col-grid">
                    <div class="input-field-group">
                        <div class="field-label">
                            <span>First name</span>
                        </div>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon-left"></i>
                            <input type="text" class="input-field" id="first-name" placeholder="River" required autocomplete="given-name">
                        </div>
                    </div>
                    <div class="input-field-group">
                        <div class="field-label">
                            <span>Last name</span>
                        </div>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon-left"></i>
                            <input type="text" class="input-field" id="last-name" placeholder="Song" required autocomplete="family-name">
                        </div>
                    </div>
                </div>

                <!-- Email -->
                <div class="input-field-group">
                    <div class="field-label">
                        <span>Email address</span>
                    </div>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon-left"></i>
                        <input type="email" class="input-field" id="email" placeholder="river@botanical.org" required autocomplete="email">
                    </div>
                </div>

                <!-- Password & Confirm - two column grid -->
                <div class="two-col-grid">
                    <div class="input-field-group">
                        <div class="field-label">
                            <span>Password</span>
                        </div>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon-left"></i>
                            <input type="password" class="input-field" id="reg-password" placeholder="••••••••" required autocomplete="new-password" oninput="updateStrength()">
                            <button type="button" class="password-eye" onclick="togglePasswordField('reg-password', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="input-field-group">
                        <div class="field-label">
                            <span>Confirm</span>
                        </div>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon-left"></i>
                            <input type="password" class="input-field" id="confirm-password" placeholder="••••••••" required autocomplete="off">
                            <button type="button" class="password-eye" onclick="togglePasswordField('confirm-password', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Strength meter -->
                <div class="strength-container">
                    <div class="strength-bar-bg">
                        <div id="strength-bar" class="strength-bar-fill"></div>
                    </div>
                    <div id="strength-text" class="strength-text">password strength</div>
                </div>

                <!-- Terms checkbox -->
                <div class="checkbox-row">
                    <input type="checkbox" id="terms-agree" required>
                    <label for="terms-agree">I agree to the <strong>Terms of Service</strong> and <strong>Privacy Policy</strong></label>
                </div>

                <button type="submit" class="btn-register" id="register-submit-btn">
                    <i class="fas fa-leaf"></i> Create account
                </button>

                <!-- Sign in link -->
                <div class="signin-prompt">
                    <span>already a member?</span>
                    <a href="login.html" class="signin-link">sign in →</a>
                </div>

                <!-- Divider & social signup -->
                <div class="divider">
                    <div class="divider-line"></div>
                    <div class="divider-text">OR JOIN WITH</div>
                    <div class="divider-line"></div>
                </div>

                <div class="social-row">
                    <button type="button" class="social-btn" id="googleRegisterBtn"><i class="fab fa-google"></i> Google</button>
                    <button type="button" class="social-btn" id="facebookRegisterBtn"><i class="fab fa-facebook-f"></i> Facebook</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            const docHtml = document.documentElement;
            const themeToggleBtn = document.getElementById('theme-toggle');
            const themeIconSpan = document.getElementById('theme-icon');
            const rtlToggleBtn = document.getElementById('rtl-toggle');

            // Theme handling
            let storedTheme = localStorage.getItem('theme') || 'light';
            docHtml.setAttribute('data-theme', storedTheme);
            updateThemeIcon(storedTheme);

            function updateThemeIcon(theme) {
                if (themeIconSpan) {
                    themeIconSpan.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-circle-half-stroke';
                }
            }

            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', () => {
                    const current = docHtml.getAttribute('data-theme');
                    const nextTheme = current === 'light' ? 'dark' : 'light';
                    docHtml.setAttribute('data-theme', nextTheme);
                    localStorage.setItem('theme', nextTheme);
                    updateThemeIcon(nextTheme);
                });
            }

            // RTL toggle
            if (rtlToggleBtn) {
                rtlToggleBtn.addEventListener('click', () => {
                    const dir = docHtml.getAttribute('dir') === 'ltr' ? 'rtl' : 'ltr';
                    docHtml.setAttribute('dir', dir);
                });
            }

            // Global password toggle function
            window.togglePasswordField = function(inputId, btnElement) {
                const inputField = document.getElementById(inputId);
                if (!inputField) return;
                const icon = btnElement.querySelector('i');
                if (inputField.type === 'password') {
                    inputField.type = 'text';
                    icon.className = 'fas fa-eye-slash';
                } else {
                    inputField.type = 'password';
                    icon.className = 'fas fa-eye';
                }
            };

            // Password strength meter
            window.updateStrength = function() {
                const pass = document.getElementById('reg-password');
                if (!pass) return;
                const password = pass.value || '';
                const bar = document.getElementById('strength-bar');
                const textEl = document.getElementById('strength-text');
                if (!bar) return;

                let strength = 0;
                if (password.length >= 6) strength += 20;
                if (password.length >= 8) strength += 15;
                if (/[0-9]/.test(password)) strength += 20;
                if (/[A-Z]/.test(password)) strength += 20;
                if (/[^A-Za-z0-9]/.test(password)) strength += 25;
                
                const finalStrength = Math.min(strength, 100);
                bar.style.width = finalStrength + '%';
                
                if (finalStrength < 30) textEl.innerText = '🌱 weak · add numbers & symbols';
                else if (finalStrength < 60) textEl.innerText = '🌿 medium · getting stronger';
                else textEl.innerText = '✨ strong · great password!';
            };

            // Toast notification
            function showToastMessage(message, duration = 2800) {
                const container = document.getElementById('toastContainer');
                if (!container) return;
                const toastDiv = document.createElement('div');
                toastDiv.className = 'toast';
                toastDiv.innerHTML = `<i class="fas fa-seedling" style="margin-right: 8px;"></i> ${message}`;
                container.appendChild(toastDiv);
                setTimeout(() => {
                    toastDiv.style.opacity = '0';
                    toastDiv.style.transform = 'translateY(8px)';
                    setTimeout(() => {
                        if (toastDiv.parentNode) toastDiv.remove();
                    }, 250);
                }, duration);
            }

            // Social buttons demo
            const googleRegBtn = document.getElementById('googleRegisterBtn');
            const fbRegBtn = document.getElementById('facebookRegisterBtn');
            if (googleRegBtn) {
                googleRegBtn.addEventListener('click', () => {
                    showToastMessage('Google sign-up demo · coming soon 🌻');
                });
            }
            if (fbRegBtn) {
                fbRegBtn.addEventListener('click', () => {
                    showToastMessage('Facebook registration demo · stay tuned');
                });
            }

            // Main register handler
            window.handleRegister = function(event) {
                event.preventDefault();
                
                const firstName = document.getElementById('first-name');
                const lastName = document.getElementById('last-name');
                const email = document.getElementById('email');
                const password = document.getElementById('reg-password');
                const confirmPwd = document.getElementById('confirm-password');
                const termsCheck = document.getElementById('terms-agree');
                const submitBtn = document.getElementById('register-submit-btn');

                // Validation
                if (!firstName.value.trim()) {
                    showToastMessage('Please enter your first name 🌿');
                    firstName.focus();
                    return;
                }
                if (!lastName.value.trim()) {
                    showToastMessage('Please enter your last name');
                    lastName.focus();
                    return;
                }
                if (!email.value.trim()) {
                    showToastMessage('Email address is required');
                    email.focus();
                    return;
                }
                if (!password.value) {
                    showToastMessage('Create a secure password');
                    password.focus();
                    return;
                }
                if (password.value !== confirmPwd.value) {
                    showToastMessage('❌ Passwords do not match');
                    confirmPwd.focus();
                    return;
                }
                if (password.value.length < 6) {
                    showToastMessage('Password must be at least 6 characters');
                    password.focus();
                    return;
                }
                if (!termsCheck.checked) {
                    showToastMessage('Please accept the terms & privacy policy');
                    return;
                }

                const originalHtml = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> creating account...';
                submitBtn.disabled = true;

                // Simulate account creation
                setTimeout(() => {
                    showToastMessage('🎉 Welcome to Botanical Garden! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'userdash.html';
                    }, 1000);
                }, 1300);
            };

            // Ensure brand never breaks on resize
            const enforceBrandNoWrap = () => {
                const brandLink = document.querySelector('.brand-link');
                if (brandLink) {
                    brandLink.style.flexWrap = 'nowrap';
                }
            };
            enforceBrandNoWrap();
            window.addEventListener('resize', enforceBrandNoWrap);
            
            // Initial strength check if any prefill (none)
            if (document.getElementById('reg-password')) {
                updateStrength();
            }
        })();
    </script>
</body>
</html>
