<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sign in · Botanical Garden</title>
    <link rel="icon" type="image/jpeg" href="/images/Botanicalpark_logo.jpg" />
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --jet-black: #0E0E0E;
            --pure-white: #FFFFFF;
            --deep-green: #1B4332;
            --soft-leaf: #74C69D;
            --text-main: #0E0E0E;
            --text-heading: #0E0E0E;
            --card-bg: #FFFFFF;
            --border-light: #D0E6D5;
            --bg-primary: #FFFFFF;
            --accent-deep: #1B4332;
            --accent-soft: #74C69D;
            --input-bg: #FFFFFF;
            --label-color: #0E0E0E;
            --input-text: #0E0E0E;
            --input-placeholder: #666666;
            --icon-color: #1B4332;
            --checkbox-label: #0E0E0E;
            --separator-text: #666666;
            --forgot-link: #1B4332;
            --intro-text: #2D2D2D;
            --social-border: #1B4332;
            --card-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
        }

        [data-theme="dark"] {
            --bg-primary: #121212;
            --text-main: #E8F0E8;
            --text-heading: #FFFFFF;
            --card-bg: #1A251F;
            --border-light: #2D6A4F;
            --accent-deep: #2D6A4F;
            --accent-soft: #8FDEB0;
            --input-bg: #1E2A22;
            --label-color: #8FDEB0;
            --input-text: #E8F0E8;
            --input-placeholder: #889988;
            --icon-color: #8FDEB0;
            --checkbox-label: #E8F0E8;
            --separator-text: #A0B0A0;
            --forgot-link: #8FDEB0;
            --intro-text: #C0D0C0;
            --social-border: #8FDEB0;
            --card-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-main);
            transition: background-color 0.25s ease, color 0.25s ease;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
            background-image: radial-gradient(circle at 20% 30%, rgba(116, 198, 157, 0.04) 0%, transparent 50%);
        }

        /* fixed corner toggles */
        .toggle-corner {
            position: fixed;
            top: 1.2rem;
            right: 1.2rem;
            display: flex;
            gap: 0.7rem;
            z-index: 1050;
        }

        .control-bubble {
            width: 44px;
            height: 44px;
            background: var(--card-bg);
            border: 2px solid var(--deep-green);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--deep-green);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(2px);
        }

        .control-bubble:hover {
            background: var(--deep-green);
            color: white;
            transform: scale(0.96);
            border-color: var(--soft-leaf);
        }

        [data-theme="dark"] .control-bubble {
            color: var(--soft-leaf);
            border-color: var(--soft-leaf);
        }
        [data-theme="dark"] .control-bubble:hover {
            background: var(--soft-leaf);
            color: #121212;
        }

        /* main container - flexible, no scroll inside */
        .auth-wrapper {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        /* card design - fresh and neat */
        .auth-card {
            background: var(--card-bg);
            border-radius: 2rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
            padding: 1.8rem 2rem 2rem;
            transition: all 0.2s;
            backdrop-filter: blur(0px);
        }

        /* brand section - SINGLE LINE FIX for 360px */
        .brand-block {
            text-align: center;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--border-light);
        }

        .brand-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            text-decoration: none;
            flex-wrap: nowrap;   /* critical: prevents wrap */
            white-space: nowrap;  /* forces single line */
        }

        .brand-icon {
            width: 2.8rem;
            height: 2.8rem;
            background: rgba(27, 67, 50, 0.1);
            border-radius: 1.2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--soft-leaf);
            flex-shrink: 0;
        }
        .brand-icon i {
            font-size: 1.7rem;
            color: var(--deep-green);
        }
        [data-theme="dark"] .brand-icon i {
            color: var(--soft-leaf);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.2;
        }

        .brand-name {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-heading);
            white-space: nowrap;
        }
        .brand-name span {
            color: var(--deep-green);
        }
        [data-theme="dark"] .brand-name span {
            color: var(--soft-leaf);
        }
        .brand-tag {
            font-size: 0.55rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            color: var(--separator-text);
            text-transform: uppercase;
            margin-top: -0.1rem;
            white-space: nowrap;
        }

        /* welcome section */
        .welcome-section {
            text-align: left;
            margin-bottom: 1.2rem;
        }
        .welcome-section h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-heading);
            line-height: 1.2;
            letter-spacing: -0.3px;
        }
        .welcome-section p {
            font-size: 0.85rem;
            color: var(--intro-text);
            margin-top: 0.2rem;
        }

        /* form fields */
        .input-field-group {
            margin-bottom: 1rem;
        }
        .field-label {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.3rem;
        }
        .field-label span {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--label-color);
        }
        .forgot-pw {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--forgot-link);
            text-decoration: none;
            border-bottom: 1px dotted var(--forgot-link);
        }
        .forgot-pw:hover {
            opacity: 0.8;
        }

        .input-wrapper {
            position: relative;
        }
        .input-icon-left {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--icon-color);
            font-size: 0.9rem;
            pointer-events: none;
        }
        .input-field {
            width: 100%;
            background: var(--input-bg);
            border: 1.5px solid var(--border-light);
            border-radius: 60px;
            padding: 0.7rem 1rem 0.7rem 2.5rem;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            color: var(--input-text);
            transition: all 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--deep-green);
            box-shadow: 0 0 0 3px rgba(27, 67, 50, 0.12);
        }
        [data-theme="dark"] .input-field:focus {
            border-color: var(--soft-leaf);
            box-shadow: 0 0 0 3px rgba(143, 222, 176, 0.2);
        }
        .password-eye {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-main);
            opacity: 0.6;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .password-eye:hover {
            opacity: 1;
            color: var(--deep-green);
        }

        /* checkbox row */
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.8rem 0 1.2rem;
        }
        .checkbox-row input {
            width: 1rem;
            height: 1rem;
            accent-color: var(--deep-green);
            cursor: pointer;
        }
        .checkbox-row label {
            font-size: 0.8rem;
            color: var(--checkbox-label);
            cursor: pointer;
        }

        /* primary button */
        .btn-signin {
            background: var(--deep-green);
            border: none;
            border-radius: 60px;
            padding: 0.75rem;
            width: 100%;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 18px -8px rgba(27, 67, 50, 0.4);
            font-family: 'Inter', sans-serif;
        }
        .btn-signin:hover {
            background: var(--soft-leaf);
            color: var(--jet-black);
            transform: translateY(-1px);
        }
        .btn-signin:active {
            transform: translateY(1px);
        }

        /* separator */
        .divider {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 1.2rem 0 1rem;
        }
        .divider-line {
            flex: 1;
            height: 1.5px;
            background: var(--border-light);
        }
        .divider-text {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--separator-text);
        }

        /* social row */
        .social-row {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-bottom: 1.4rem;
        }
        .social-btn {
            flex: 1;
            background: transparent;
            border: 1.5px solid var(--social-border);
            border-radius: 50px;
            padding: 0.55rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--deep-green);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        [data-theme="dark"] .social-btn {
            color: var(--soft-leaf);
        }
        .social-btn i {
            font-size: 0.9rem;
        }
        .social-btn:hover {
            background: var(--deep-green);
            color: white;
            border-color: var(--deep-green);
        }
        [data-theme="dark"] .social-btn:hover {
            background: var(--soft-leaf);
            color: #121212;
            border-color: var(--soft-leaf);
        }

        /* create account - fresh link style */
        .create-account-cta {
            text-align: center;
            margin-top: 0.2rem;
        }
        .create-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: transparent;
            border: 1.5px solid var(--deep-green);
            border-radius: 60px;
            padding: 0.55rem 1.4rem;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--deep-green);
            text-decoration: none;
            transition: 0.2s;
        }
        .create-link i {
            font-size: 0.8rem;
        }
        .create-link:hover {
            background: var(--deep-green);
            color: white;
        }
        [data-theme="dark"] .create-link {
            color: var(--soft-leaf);
            border-color: var(--soft-leaf);
        }
        [data-theme="dark"] .create-link:hover {
            background: var(--soft-leaf);
            color: #121212;
        }

        /* toast */
        .toast-container {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1100;
            width: auto;
            max-width: 90%;
            pointer-events: none;
        }
        .toast {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-left: 5px solid var(--soft-leaf);
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            box-shadow: 0 12px 24px -12px rgba(0,0,0,0.3);
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-main);
            border: 1px solid var(--border-light);
            text-align: center;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- critical: brand name never breaks even at 360px --- */
        @media (max-width: 420px) {
            .auth-card {
                padding: 1.2rem 1.3rem 1.6rem;
            }
            .brand-link {
                gap: 0.45rem;
            }
            .brand-name {
                font-size: 1.45rem;
                white-space: nowrap;
            }
            .brand-tag {
                font-size: 0.48rem;
                white-space: nowrap;
            }
            .brand-icon {
                width: 2.4rem;
                height: 2.4rem;
            }
            .brand-icon i {
                font-size: 1.4rem;
            }
            .welcome-section h2 {
                font-size: 1.55rem;
            }
        }

        /* extra safety for 360px and below: prevent any wrapping */
        @media (max-width: 360px) {
            .brand-name {
                font-size: 1.3rem;
                white-space: nowrap;
            }
            .brand-tag {
                font-size: 0.45rem;
                white-space: nowrap;
            }
            .brand-link {
                gap: 0.35rem;
            }
            .auth-card {
                padding: 1rem 1.1rem 1.4rem;
            }
            .brand-text {
                max-width: 100%;
            }
        }

        /* ensure no overflow on tiny devices */
        body {
            overflow-y: auto;
        }
        .auth-wrapper {
            max-height: 100vh;
            overflow-y: auto;
            scrollbar-width: thin;
            padding: 0.5rem 0;
        }
        /* subtle scroll only if needed */
        .auth-wrapper::-webkit-scrollbar {
            width: 4px;
        }
    </style>
</head>
<body>
    <div class="toggle-corner">
        <button class="control-bubble" id="rtl-toggle" title="RTL/LTR" aria-label="Toggle direction">
            <i class="fas fa-arrows-rotate"></i>
        </button>
        <button class="control-bubble" id="theme-toggle" title="Dark/Light mode" aria-label="Theme">
            <i class="fas fa-circle-half-stroke" id="theme-icon"></i>
        </button>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- Brand area: forced single line -->
            <div class="brand-block">
                <a href="index.html" class="brand-link">
                    <div class="brand-icon">
                        <i class="fas fa-seedling"></i>
                    </div>
                    <div class="brand-text">
                        <div class="brand-name">Botanical<span> Garden</span></div>
                        <div class="brand-tag">botanical preserve</div>
                    </div>
                </a>
            </div>

            <!-- welcome & sign in headline -->
            <div class="welcome-section">
                <h2>Welcome back</h2>
                <p>Find your calm · access your green sanctuary</p>
            </div>

            <!-- Login form (no register tab, clean) -->
            <form id="loginFormElement" onsubmit="handleAuth(event)">
                <div class="input-field-group">
                    <div class="field-label">
                        <span>Email address</span>
                    </div>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon-left"></i>
                        <input type="email" class="input-field" id="login-email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                </div>

                <div class="input-field-group">
                    <div class="field-label">
                        <span>Password</span>
                        <a href="contact.html" class="forgot-pw">Forgot  Password?</a>
                    </div>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon-left"></i>
                        <input type="password" class="input-field" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="password-eye" onclick="togglePasswordField('login-password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="checkbox-row">
                    <input type="checkbox" id="remember-device">
                    <label for="remember-device">Remember this device</label>
                </div>

                <button type="submit" class="btn-signin" id="login-submit-btn">
                    <i class="fas fa-leaf"></i> Sign in
                </button>

                <div class="divider">
                    <div class="divider-line"></div>
                    <div class="divider-text">OR CONNECT WITH</div>
                    <div class="divider-line"></div>
                </div>

                <div class="social-row">
                    <button type="button" class="social-btn" id="googleMockBtn"><i class="fab fa-google"></i> Google</button>
                    <button type="button" class="social-btn" id="facebookMockBtn"><i class="fab fa-facebook-f"></i> Facebook</button>
                </div>
            </form>

            <!-- register redirect (beautiful) -->
            <div class="create-account-cta">
                <a href="register.html" class="create-link">
                    <i class="fas fa-user-plus"></i> Create new account
                </a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            const docHtml = document.documentElement;
            const themeToggleBtn = document.getElementById('theme-toggle');
            const themeIconSpan = document.getElementById('theme-icon');
            const rtlToggleBtn = document.getElementById('rtl-toggle');

            // --- theme handling ---
            let storedTheme = localStorage.getItem('theme') || 'light';
            docHtml.setAttribute('data-theme', storedTheme);
            updateThemeIcon(storedTheme);

            function updateThemeIcon(theme) {
                if (themeIconSpan) {
                    themeIconSpan.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-circle-half-stroke';
                }
            }

            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', () => {
                    const current = docHtml.getAttribute('data-theme');
                    const nextTheme = current === 'light' ? 'dark' : 'light';
                    docHtml.setAttribute('data-theme', nextTheme);
                    localStorage.setItem('theme', nextTheme);
                    updateThemeIcon(nextTheme);
                });
            }

            // RTL toggle
            if (rtlToggleBtn) {
                rtlToggleBtn.addEventListener('click', () => {
                    const dir = docHtml.getAttribute('dir') === 'ltr' ? 'rtl' : 'ltr';
                    docHtml.setAttribute('dir', dir);
                });
            }

            // global password toggle
            window.togglePasswordField = function(inputId, btnElement) {
                const inputField = document.getElementById(inputId);
                if (!inputField) return;
                const icon = btnElement.querySelector('i');
                if (inputField.type === 'password') {
                    inputField.type = 'text';
                    icon.className = 'fas fa-eye-slash';
                } else {
                    inputField.type = 'password';
                    icon.className = 'fas fa-eye';
                }
            };

            // toast system
            function showToastMessage(message, duration = 2800) {
                const container = document.getElementById('toastContainer');
                if (!container) return;
                const toastDiv = document.createElement('div');
                toastDiv.className = 'toast';
                toastDiv.innerHTML = `<i class="fas fa-foliage" style="margin-right: 8px;"></i> ${message}`;
                container.appendChild(toastDiv);
                setTimeout(() => {
                    toastDiv.style.opacity = '0';
                    toastDiv.style.transform = 'translateY(8px)';
                    setTimeout(() => {
                        if (toastDiv.parentNode) toastDiv.remove();
                    }, 250);
                }, duration);
            }

            // Social buttons demo (same as original: no actual OAuth)
            const googleBtn = document.getElementById('googleMockBtn');
            const fbBtn = document.getElementById('facebookMockBtn');
            if (googleBtn) {
                googleBtn.addEventListener('click', () => {
                    showToastMessage('Google sign-in demo · stay tuned 🌱');
                });
            }
            if (fbBtn) {
                fbBtn.addEventListener('click', () => {
                    showToastMessage('Facebook connection demo · coming soon');
                });
            }

            // main login handler (simulate success redirect to userdash)
            window.handleAuth = function(event) {
                event.preventDefault();
                const emailInput = document.getElementById('login-email');
                const passwordInput = document.getElementById('login-password');
                const submitBtn = document.getElementById('login-submit-btn');
                
                // basic validation feedback
                if (!emailInput.value.trim()) {
                    showToastMessage('Please enter your email address 🌿');
                    emailInput.focus();
                    return;
                }
                if (!passwordInput.value) {
                    showToastMessage('Password cannot be empty');
                    passwordInput.focus();
                    return;
                }
                
                const originalHtml = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> verifying...';
                submitBtn.disabled = true;
                
                // simulate async authentication
                setTimeout(() => {
                    showToastMessage('Welcome back, nature lover 🌿✨');
                    setTimeout(() => {
                        // redirect as original requirement
                        window.location.href = 'userdash.html';
                    }, 900);
                }, 1100);
            };

            // additional check: ensure brand never breaks due to any external factor
            // also optional: make sure no overflow on card
            const adjustBrandSpacing = () => {
                const brandLink = document.querySelector('.brand-link');
                if (brandLink) {
                    // force inline flex and nowrap already from CSS
                    brandLink.style.flexWrap = 'nowrap';
                }
            };
            adjustBrandSpacing();
            window.addEventListener('resize', adjustBrandSpacing);
        })();
    </script>
</body>
</html>
